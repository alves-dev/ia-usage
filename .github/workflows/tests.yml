name: Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Ruff and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout integration
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run Ruff
        run: uv run ruff check custom_components/ia_usage tests

      - name: Run pytest
        run: uv run pytest
